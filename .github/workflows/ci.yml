name: CI

# Manual only — run the same checks locally via ./scripts/check.sh
on:
  push:
    branches:
      - dev
  pull_request:
    branches:
      - dev
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    name: Local-parity checks
    runs-on: [self-hosted, linux, x64, podman]
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Local-parity checks
        run: bash scripts/check.sh
